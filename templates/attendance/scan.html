<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Scan QR — UniAttend</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0A4D68;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
.card{background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.2);width:100%;max-width:400px;overflow:hidden}
.header{background:#0A4D68;color:#fff;padding:20px 24px;text-align:center}
.header h1{font-size:1.2rem;font-weight:700}
.header p{font-size:.82rem;opacity:.7;margin-top:4px}
.body{padding:20px}
.user-bar{display:flex;align-items:center;gap:10px;background:#EEF2F7;border-radius:10px;padding:12px 16px;margin-bottom:16px}
.avatar{width:36px;height:36px;background:#0A4D68;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.85rem;flex-shrink:0}
.user-name{font-weight:600;font-size:.9rem;color:#0D1B2A}
.user-id{font-size:.75rem;color:#5A7391}
.logout-link{margin-left:auto;font-size:.8rem;color:#E84040;text-decoration:none;font-weight:600}

/* Camera */
.camera-wrapper{position:relative;width:100%;background:#000;border-radius:12px;overflow:hidden;margin-bottom:12px;display:none}
.camera-wrapper video{width:100%;display:block;max-height:260px;object-fit:cover}
.scan-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.scan-frame{width:160px;height:160px;position:relative}
.scan-frame::before,.scan-frame::after{content:'';position:absolute;width:30px;height:30px;border-color:#00C9A7;border-style:solid}
.scan-frame::before{top:0;left:0;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.scan-frame::after{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
.scan-frame-b::before,.scan-frame-b::after{content:'';position:absolute;width:30px;height:30px;border-color:#00C9A7;border-style:solid}
.scan-frame-b::before{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
.scan-frame-b::after{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
.scan-line{position:absolute;left:10px;right:10px;height:2px;background:linear-gradient(90deg,transparent,#00C9A7,transparent);top:50%;animation:scanMove 1.5s ease-in-out infinite alternate}
@keyframes scanMove{0%{top:10%}100%{top:90%}}
.scan-status{text-align:center;font-size:.82rem;padding:6px 0 10px;color:#5A7391}
.scan-status.active{color:#00C9A7;font-weight:600}
.scan-status.err{color:#E84040}

/* Buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border:none;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;text-decoration:none}
.btn-main{background:#0A4D68;color:#fff;margin-bottom:8px}
.btn-main:hover{background:#1A7A9A}
.btn-main:active{transform:scale(.98)}
.btn-stop{background:#E84040;color:#fff;margin-bottom:8px;display:none}
.btn-outline{background:transparent;color:#0A4D68;border:2px solid #0A4D68}
.btn-outline:hover{background:#0A4D68;color:#fff}
.btn:disabled{opacity:.6;cursor:not-allowed}

/* Divider */
.divider{text-align:center;color:#8FA8C0;font-size:.78rem;margin:12px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:36%;height:1px;background:#D0DAE8}
.divider::before{left:0}.divider::after{right:0}

/* Input */
.form-label{font-weight:600;font-size:.82rem;display:block;margin-bottom:6px;color:#0D1B2A}
.token-input{width:100%;padding:11px 14px;border:1.5px solid #D0DAE8;border-radius:10px;font-size:.9rem;outline:none;font-family:inherit;margin-bottom:10px;background:#f8fafc}
.token-input:focus{border-color:#1A7A9A;box-shadow:0 0 0 3px rgba(26,122,154,.1);background:#fff}

/* Result */
.result-box{border-radius:12px;padding:24px;text-align:center;display:none}
.result-box.ok{background:rgba(39,174,96,.08);border:1.5px solid rgba(39,174,96,.3)}
.result-box.fail{background:rgba(232,64,64,.08);border:1.5px solid rgba(232,64,64,.3)}
.result-icon{font-size:3rem;margin-bottom:10px}
.result-title{font-size:1.1rem;font-weight:700;margin-bottom:6px}
.result-title.ok{color:#166534}
.result-title.fail{color:#b91c1c}
.result-msg{font-size:.85rem;color:#5A7391;line-height:1.5;margin-bottom:16px}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

{% csrf_token %}

<div class="card">
  <div class="header">
    <h1>📷 Mark Attendance</h1>
    <p>Scan QR code or enter token manually</p>
  </div>

  <div class="body">
    <div class="user-bar">
      <div class="avatar">{{request.user.first_name.0}}{{request.user.last_name.0}}</div>
      <div>
        <div class="user-name">{{request.user.get_full_name}}</div>
        <div class="user-id">{{request.user.student_profile.student_id}}</div>
      </div>
      <a href="/accounts/logout/" class="logout-link">Logout</a>
    </div>

    <!-- RESULT BOX -->
    <div id="result-box" class="result-box">
      <div class="result-icon" id="r-icon"></div>
      <div class="result-title" id="r-title"></div>
      <div class="result-msg" id="r-msg"></div>
      <button class="btn btn-main" onclick="resetAll()">↩ Scan Again</button>
      <a href="/dashboard/student/" class="btn btn-outline">Go to Dashboard</a>
    </div>

    <!-- SCANNER SECTION -->
    <div id="scan-section">

      <!-- Camera view -->
      <div id="camera-wrapper" class="camera-wrapper">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas" style="display:none"></canvas>
        <div class="scan-overlay">
          <div class="scan-frame">
            <div class="scan-frame-b"></div>
            <div class="scan-line"></div>
          </div>
        </div>
      </div>

      <div class="scan-status" id="scan-status">Ready to scan</div>

      <!-- Camera buttons -->
      <button class="btn btn-main" id="btn-start" onclick="startCam()">
        📷 Open Camera Scanner
      </button>
      <button class="btn btn-stop" id="btn-stop" onclick="stopCam()">
        ✕ Stop Camera
      </button>

      <div class="divider">or type / paste token manually</div>

      <!-- Manual input -->
      <label class="form-label">QR Token</label>
      <input type="text" id="token-input" class="token-input"
        placeholder="Paste QR token here..."
        value="{{token}}" autocomplete="off" spellcheck="false">

      <button class="btn btn-main" id="btn-submit" onclick="submitToken()">
        <span class="spinner" id="spinner"></span>
        <span id="btn-txt">✅ Mark My Attendance</span>
      </button>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
// Get CSRF from the rendered token in the page
function csrf() {
  const el = document.querySelector('input[name="csrfmiddlewaretoken"]');
  return el ? el.value : '';
}

let camStream = null;
let camTimer = null;
let isScanning = false;

// Auto-submit if token pre-filled
window.onload = function() {
  const t = document.getElementById('token-input').value.trim();
  if (t) submitToken();
};

// ── START CAMERA ──
async function startCam() {
  const status = document.getElementById('scan-status');
  status.textContent = 'Opening camera...';
  status.className = 'scan-status';

  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } }
    });

    const video = document.getElementById('video');
    video.srcObject = camStream;
    await video.play();

    document.getElementById('camera-wrapper').style.display = 'block';
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'flex';

    status.textContent = '🔍 Scanning... point at QR code';
    status.className = 'scan-status active';
    isScanning = true;

    camTimer = setInterval(readFrame, 250);

  } catch(e) {
    status.textContent = '❌ Camera blocked. Please use token below.';
    status.className = 'scan-status err';
  }
}

// ── READ FRAME ──
function readFrame() {
  if (!isScanning) return;
  const video = document.getElementById('video');
  if (video.readyState < 2) return;

  const canvas = document.getElementById('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);

  const img = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height);
  const result = jsQR(img.data, img.width, img.height);

  if (result && result.data) {
    isScanning = false;
    stopCam();
    handleQR(result.data);
  }
}

// ── STOP CAMERA ──
function stopCam() {
  isScanning = false;
  clearInterval(camTimer);
  if (camStream) {
    camStream.getTracks().forEach(t => t.stop());
    camStream = null;
  }
  document.getElementById('camera-wrapper').style.display = 'none';
  document.getElementById('btn-start').style.display = 'flex';
  document.getElementById('btn-stop').style.display = 'none';
  document.getElementById('scan-status').textContent = 'Camera stopped';
  document.getElementById('scan-status').className = 'scan-status';
}

// ── HANDLE QR DATA ──
function handleQR(raw) {
  // Format: UNIATTEND|TOKEN|course_id|session_id|timestamp
  const parts = raw.split('|');
  const token = (parts[0] === 'UNIATTEND' && parts[1]) ? parts[1] : raw;
  document.getElementById('token-input').value = token;
  submitToken();
}

// ── SUBMIT TOKEN ──
async function submitToken() {
  const token = document.getElementById('token-input').value.trim();
  if (!token) { alert('Please enter a token or scan a QR code.'); return; }

  const btn = document.getElementById('btn-submit');
  const spinner = document.getElementById('spinner');
  const txt = document.getElementById('btn-txt');
  btn.disabled = true;
  spinner.style.display = 'inline-block';
  txt.textContent = 'Recording...';

  try {
    const res = await fetch('/api/attendance/scan/', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': csrf()
      },
      credentials: 'same-origin',
      body: JSON.stringify({ qr_token: token })
    });
    const data = await res.json();
    showResult(res.ok, data);
  } catch(e) {
    showResult(false, { error: 'Network error. Check your connection.' });
  }

  btn.disabled = false;
  spinner.style.display = 'none';
  txt.textContent = '✅ Mark My Attendance';
}

// ── SHOW RESULT ──
function showResult(ok, data) {
  document.getElementById('scan-section').style.display = 'none';
  const box = document.getElementById('result-box');
  box.style.display = 'block';
  box.className = 'result-box ' + (ok ? 'ok' : 'fail');
  document.getElementById('r-icon').textContent = ok ? '✅' : '❌';
  const title = document.getElementById('r-title');
  title.textContent = ok ? 'Attendance Recorded!' : 'Not Recorded';
  title.className = 'result-title ' + (ok ? 'ok' : 'fail');
  document.getElementById('r-msg').textContent = ok
    ? 'Course: ' + data.course + ' (' + data.course_code + ')'
    : (data.error || 'Something went wrong.');
}

// ── RESET ──
function resetAll() {
  document.getElementById('result-box').style.display = 'none';
  document.getElementById('scan-section').style.display = 'block';
  document.getElementById('token-input').value = '';
  document.getElementById('scan-status').textContent = 'Ready to scan';
  document.getElementById('scan-status').className = 'scan-status';
}
</script>
</body>
</html>
