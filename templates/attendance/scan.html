<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Scan QR — UniAttend</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#F4F7FA;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
.card{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(10,77,104,.12);width:100%;max-width:420px;overflow:hidden}
.header{background:#0A4D68;color:#fff;padding:20px 24px;text-align:center}
.header h1{font-size:1.2rem;font-weight:700}
.header p{font-size:.82rem;opacity:.7;margin-top:4px}
.body{padding:20px}
.user-bar{display:flex;align-items:center;gap:10px;background:#EEF2F7;border-radius:10px;padding:12px 16px;margin-bottom:16px}
.avatar{width:36px;height:36px;background:#0A4D68;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.85rem;flex-shrink:0}
.user-name{font-weight:600;font-size:.9rem}
.user-id{font-size:.75rem;color:#5A7391}
.logout-link{margin-left:auto;font-size:.8rem;color:#5A7391;text-decoration:none}
.logout-link:hover{color:#E84040}

/* Camera section */
.camera-wrapper{position:relative;width:100%;background:#000;border-radius:12px;overflow:hidden;margin-bottom:16px}
.camera-wrapper video{width:100%;display:block;max-height:280px;object-fit:cover}
.scan-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.scan-box{width:180px;height:180px;border:3px solid #00C9A7;border-radius:12px;position:relative;animation:scanPulse 2s infinite}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#00C9A7,transparent);animation:scanMove 1.5s linear infinite}
@keyframes scanPulse{0%,100%{border-color:#00C9A7;box-shadow:0 0 0 0 rgba(0,201,167,.4)}50%{border-color:#00ffcc;box-shadow:0 0 0 8px rgba(0,201,167,0)}}
@keyframes scanMove{0%{top:0}100%{top:100%}}
.scan-corner{position:absolute;width:20px;height:20px;border-color:#00C9A7;border-style:solid}
.scan-corner.tl{top:-2px;left:-2px;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.scan-corner.tr{top:-2px;right:-2px;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
.scan-corner.bl{bottom:-2px;left:-2px;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
.scan-corner.br{bottom:-2px;right:-2px;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
.scan-status{text-align:center;font-size:.8rem;color:#5A7391;padding:8px 0;margin-bottom:8px}
.scan-status.scanning{color:#00C9A7;font-weight:600}
.scan-status.error{color:#E84040}

/* Buttons */
.btn{display:block;width:100%;padding:13px;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;text-align:center}
.btn-primary{background:#0A4D68;color:#fff}
.btn-primary:hover{background:#1A7A9A}
.btn-secondary{background:transparent;color:#0A4D68;border:1.5px solid #0A4D68;margin-top:8px}
.btn-secondary:hover{background:#0A4D68;color:#fff}
.btn-danger{background:#E84040;color:#fff;margin-top:8px}
.btn:disabled{opacity:.6;cursor:not-allowed}

/* Manual input */
.divider{text-align:center;color:#8FA8C0;font-size:.8rem;margin:14px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:38%;height:1px;background:#D0DAE8}
.divider::before{left:0}.divider::after{right:0}
.form-label{font-weight:600;font-size:.84rem;display:block;margin-bottom:6px;color:#0D1B2A}
input.token-input{width:100%;padding:11px 14px;border:1.5px solid #D0DAE8;border-radius:10px;font-size:.95rem;outline:none;font-family:inherit;margin-bottom:10px}
input.token-input:focus{border-color:#1A7A9A;box-shadow:0 0 0 3px rgba(26,122,154,.12)}

/* Result */
.result-box{border-radius:12px;padding:20px;text-align:center;margin-top:4px;display:none}
.result-box.success{background:rgba(39,174,96,.1);border:1px solid rgba(39,174,96,.3)}
.result-box.error{background:rgba(232,64,64,.1);border:1px solid rgba(232,64,64,.3)}
.result-icon{font-size:2.5rem;margin-bottom:8px}
.result-title{font-size:1.1rem;font-weight:700}
.result-title.success{color:#166534}
.result-title.error{color:#b91c1c}
.result-detail{font-size:.85rem;color:#5A7391;margin-top:6px;line-height:1.5}

/* Spinner */
.spinner{display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
{% load static %}
<div class="card">
  <div class="header">
    <h1>📷 Mark Attendance</h1>
    <p>Scan the QR code shown by your lecturer</p>
  </div>
  <div class="body">

    <div class="user-bar">
      <div class="avatar">{{request.user.first_name.0}}{{request.user.last_name.0}}</div>
      <div>
        <div class="user-name">{{request.user.get_full_name}}</div>
        <div class="user-id">{{request.user.student_profile.student_id}}</div>
      </div>
      <a href="/accounts/logout/" class="logout-link">Logout</a>
    </div>

    <!-- Result box -->
    <div id="result-box" class="result-box">
      <div class="result-icon" id="result-icon"></div>
      <div class="result-title" id="result-title"></div>
      <div class="result-detail" id="result-detail"></div>
      <button class="btn btn-primary" style="margin-top:16px" onclick="resetScan()">Scan Another</button>
      <a href="/dashboard/student/" class="btn btn-secondary" style="display:block;padding:13px">Go to Dashboard</a>
    </div>

    <!-- Scanner section -->
    <div id="scanner-section">
      <!-- Camera -->
      <div id="camera-wrapper" class="camera-wrapper" style="display:none">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas" style="display:none"></canvas>
        <div class="scan-overlay">
          <div class="scan-box">
            <div class="scan-line"></div>
            <div class="scan-corner tl"></div>
            <div class="scan-corner tr"></div>
            <div class="scan-corner bl"></div>
            <div class="scan-corner br"></div>
          </div>
        </div>
      </div>
      <div class="scan-status" id="scan-status">Camera not started</div>

      <button class="btn btn-primary" id="camera-btn" onclick="startCamera()">
        📷 Open Camera to Scan QR
      </button>
      <button class="btn btn-danger" id="stop-btn" style="display:none" onclick="stopCamera()">
        ✕ Stop Camera
      </button>

      <div class="divider">or enter token manually</div>

      <label class="form-label">QR Token</label>
      <input type="text" id="token-input" class="token-input"
        placeholder="Paste token here..." value="{{token}}"
        autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="btn btn-primary" id="submit-btn" onclick="submitToken()">
        <span class="spinner" id="spinner"></span>
        <span id="btn-text">Mark My Attendance</span>
      </button>
    </div>

  </div>
</div>

<!-- jsQR library — works on ALL phones and browsers -->
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
{% csrf_token %}

let stream = null;
let scanInterval = null;
let scanning = false;

// Auto submit if token in URL
window.addEventListener('load', () => {
  const t = document.getElementById('token-input').value.trim();
  if (t) submitToken();
});

// ── CAMERA SCANNER ──
async function startCamera() {
  const wrapper = document.getElementById('camera-wrapper');
  const video = document.getElementById('video');
  const status = document.getElementById('scan-status');
  const cameraBtn = document.getElementById('camera-btn');
  const stopBtn = document.getElementById('stop-btn');

  status.textContent = 'Requesting camera access...';
  status.className = 'scan-status';

  try {
    // Try back camera first (better for scanning)
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 1280 },
        height: { ideal: 720 }
      }
    });

    video.srcObject = stream;
    await video.play();

    wrapper.style.display = 'block';
    cameraBtn.style.display = 'none';
    stopBtn.style.display = 'block';
    status.textContent = '🔍 Scanning... point at QR code';
    status.className = 'scan-status scanning';
    scanning = true;

    // Start scanning frames
    scanInterval = setInterval(scanFrame, 200);

  } catch (err) {
    status.textContent = '❌ Camera access denied. Use manual token below.';
    status.className = 'scan-status error';
    console.error('Camera error:', err);
  }
}

function scanFrame() {
  if (!scanning) return;
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');

  if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

  // Use jsQR to decode
  const code = jsQR(imageData.data, imageData.width, imageData.height, {
    inversionAttempts: 'dontInvert'
  });

  if (code) {
    scanning = false;
    stopCamera();
    processQRData(code.data);
  }
}

function stopCamera() {
  scanning = false;
  clearInterval(scanInterval);
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
  document.getElementById('camera-wrapper').style.display = 'none';
  document.getElementById('camera-btn').style.display = 'block';
  document.getElementById('stop-btn').style.display = 'none';
  document.getElementById('scan-status').textContent = 'Camera stopped';
  document.getElementById('scan-status').className = 'scan-status';
}

function processQRData(rawData) {
  // Parse UNIATTEND|token|course_id|session_id|timestamp
  const parts = rawData.split('|');
  let token = '';
  if (parts[0] === 'UNIATTEND' && parts.length >= 2) {
    token = parts[1];
  } else {
    token = rawData; // use raw if format unknown
  }
  document.getElementById('token-input').value = token;
  submitToken();
}

// ── MANUAL TOKEN SUBMIT ──
async function submitToken() {
  const token = document.getElementById('token-input').value.trim();
  if (!token) {
    alert('Please enter or scan a QR token.');
    return;
  }

  const btn = document.getElementById('submit-btn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btn-text');

  btn.disabled = true;
  spinner.style.display = 'inline-block';
  btnText.textContent = 'Recording...';

  try {
    const res = await fetch('/api/attendance/scan/', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': getCSRF(),
      },
      credentials: 'same-origin',
      body: JSON.stringify({ qr_token: token })
    });

    const data = await res.json();
    showResult(res.ok, data);

  } catch (e) {
    showResult(false, { error: 'Network error. Please try again.' });
  }

  btn.disabled = false;
  spinner.style.display = 'none';
  btnText.textContent = 'Mark My Attendance';
}

function showResult(ok, data) {
  document.getElementById('scanner-section').style.display = 'none';
  const box = document.getElementById('result-box');
  box.style.display = 'block';
  box.className = 'result-box ' + (ok ? 'success' : 'error');
  document.getElementById('result-icon').textContent = ok ? '✅' : '❌';
  const title = document.getElementById('result-title');
  title.textContent = ok ? 'Attendance Recorded!' : 'Not Recorded';
  title.className = 'result-title ' + (ok ? 'success' : 'error');
  document.getElementById('result-detail').textContent = ok
    ? `Course: ${data.course} (${data.course_code})\nSession: ${data.session_id}`
    : (data.error || 'Something went wrong.');
}

function resetScan() {
  document.getElementById('result-box').style.display = 'none';
  document.getElementById('scanner-section').style.display = 'block';
  document.getElementById('token-input').value = '';
  document.getElementById('scan-status').textContent = 'Camera not started';
}

function getCSRF() {
  const el = document.querySelector('[name=csrfmiddlewaretoken]');
  return el ? el.value : '';
}

</script>
</body>
</html>
